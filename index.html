<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title id="pageTitle">致新世界</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/home.css">
</head>
<body>
  <div class="home-page">
    <!-- 云层效果 -->
    <div class="clouds-container">
      <div class="cloud"></div>
      <div class="cloud"></div>
      <div class="cloud"></div>
      <div class="cloud"></div>
      <div class="cloud"></div>
    </div>
    
    <!-- 中心圣光 -->
    <div class="holy-light"></div>
    
    <!-- 漂浮尘埃粒子 -->
    <div class="dust-container">
      <div class="dust"></div>
      <div class="dust"></div>
      <div class="dust"></div>
      <div class="dust"></div>
      <div class="dust"></div>
      <div class="dust"></div>
      <div class="dust"></div>
      <div class="dust"></div>
      <div class="dust"></div>
      <div class="dust"></div>
    </div>
    
    <!-- 羽毛飘落 -->
    <div class="feathers-container">
      <div class="feather small" style="transform: rotate(-20deg);"><div class="feather-body"></div><div class="feather-stem"></div></div>
      <div class="feather" style="transform: rotate(35deg);"><div class="feather-body"></div><div class="feather-stem"></div></div>
      <div class="feather medium" style="transform: rotate(-50deg);"><div class="feather-body"></div><div class="feather-stem"></div></div>
      <div class="feather large" style="transform: rotate(15deg);"><div class="feather-body"></div><div class="feather-stem"></div></div>
      <div class="feather" style="transform: rotate(-35deg);"><div class="feather-body"></div><div class="feather-stem"></div></div>
      <div class="feather small" style="transform: rotate(45deg);"><div class="feather-body"></div><div class="feather-stem"></div></div>
      <div class="feather medium" style="transform: rotate(-15deg);"><div class="feather-body"></div><div class="feather-stem"></div></div>
      <div class="feather" style="transform: rotate(55deg);"><div class="feather-body"></div><div class="feather-stem"></div></div>
      <div class="feather large" style="transform: rotate(-40deg);"><div class="feather-body"></div><div class="feather-stem"></div></div>
      <div class="feather small" style="transform: rotate(25deg);"><div class="feather-body"></div><div class="feather-stem"></div></div>
      <div class="feather medium" style="transform: rotate(-60deg);"><div class="feather-body"></div><div class="feather-stem"></div></div>
      <div class="feather" style="transform: rotate(10deg);"><div class="feather-body"></div><div class="feather-stem"></div></div>
    </div>
    
    <!-- 星光粒子 -->
    <div class="stars-container">
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
    </div>
    
    <!-- 光效射线 -->
    <div class="rays-container">
      <div class="light-ray"></div>
      <div class="light-ray"></div>
      <div class="light-ray"></div>
      <div class="light-ray"></div>
      <div class="light-ray"></div>
    </div>
    
    <!-- 光晕圆环 -->
    <div class="rings-container">
      <div class="gold-ring ring-1"></div>
      <div class="gold-ring ring-2"></div>
      <div class="gold-ring ring-3"></div>
    </div>
    
    <!-- 漂浮光斑 -->
    <div class="orbs-container">
      <div class="light-orb"></div>
      <div class="light-orb"></div>
      <div class="light-orb"></div>
    </div>

    <div class="hero">
      <div class="title-glow-wrapper">
        <div class="title-glow"></div>
        <h1 class="hero-title" id="heroTitle">致新世界</h1>
      </div>
      <p class="hero-subtitle" id="heroSubtitle">TO NEW WORLD</p>
      <div class="title-line"></div>
      <p class="hero-tagline" id="heroTagline">当最后一颗星辰坠落，我们将在废墟中，找到通往新世界的路。</p>
      <button class="btn" onclick="location.href='character.html'">
        <span>开始旅程</span>
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
      </button>
    </div>

    <div class="home-footer">
      <p id="footerCredit">剧本杀阅读器</p>
    </div>
  </div>

  <script src="js/debug.js"></script>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/settings.js"></script>
  <script>
    Settings.init();
    document.getElementById('pageTitle').textContent = AppConfig.name;
    document.getElementById('heroTitle').textContent = AppConfig.name;
    document.getElementById('heroSubtitle').textContent = AppConfig.subtitle || '';
    document.getElementById('heroTagline').innerHTML = AppConfig.tagline || '';
    document.getElementById('footerCredit').textContent = '未来yuki';
    Debug.info('Home page loaded');
  </script>
</body>
</html>
