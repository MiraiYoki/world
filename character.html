<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title id="pageTitle">选择角色 · 致新世界</title>
  <link rel="stylesheet" href="css/common.css">
  <link rel="stylesheet" href="css/character.css">
</head>
<body>
  <div class="char-page page-enter">
    <div class="top-bar">
      <button class="btn-icon" onclick="location.href='index.html'" title="返回">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
      </button>
      <span class="title">选择你的角色</span>
    </div>

    <div class="char-carousel">
      <div class="carousel-wrapper" id="carouselWrapper">
        <div class="carousel-track" id="carouselTrack"></div>
      </div>
    </div>

    <div class="char-bottom-bar">
      <div class="bottom-nav">
        <button class="nav-btn" id="prevBtn" title="上一个">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
        </button>
        <div class="nav-indicator" id="navIndicator"></div>
        <button class="nav-btn" id="nextBtn" title="下一个">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M9 18l6-6-6-6"/></svg>
        </button>
      </div>
      
      <div class="bottom-content">
        <div class="bottom-name-display" id="bottomNameDisplay">任远</div>
        <div class="bottom-desc" id="bottomDesc">怀纳世界，心无一物。收藏家游走于废墟之间，收集着旧世界最后的遗产。</div>
      </div>
      
      <button class="bottom-confirm" id="bottomConfirm">请选择</button>
    </div>
  </div>

  <script src="js/debug.js"></script>
  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/settings.js"></script>
  <script src="data/characters.js"></script>
  <script>
    Settings.init();
    document.getElementById('pageTitle').textContent = '选择角色 · ' + (AppConfig.name || '致新世界');

    var currentIndex = 0;
    var isSelected = false;
    var isAnimating = false;
    var selectedCharacter = null;
    var touchStartX = 0;
    var touchStartY = 0;
    var isDragging = false;

    var carouselTrack = document.getElementById('carouselTrack');
    var bottomNameDisplay = document.getElementById('bottomNameDisplay');
    var bottomDesc = document.getElementById('bottomDesc');
    var bottomConfirm = document.getElementById('bottomConfirm');
    var navIndicator = document.getElementById('navIndicator');
    var prevBtn = document.getElementById('prevBtn');
    var nextBtn = document.getElementById('nextBtn');

    function initCarousel() {
      carouselTrack.innerHTML = '';
      
      var sortedChars = CHARACTERS.map(function(char, index) {
        return { char: char, originalIndex: index };
      });
      
      sortedChars.sort(function(a, b) {
        var posA = getPositionPriority(a.originalIndex);
        var posB = getPositionPriority(b.originalIndex);
        return posA - posB;
      });
      
      sortedChars.forEach(function(item, displayIndex) {
        var char = item.char;
        var index = item.originalIndex;
        
        var card = document.createElement('div');
        card.className = 'char-card';
        card.dataset.index = index;
        
        card.innerHTML = 
          '<div class="card-back">' +
            '<div class="card-back-frame"></div>' +
            '<div class="card-back-corner top-left"></div>' +
            '<div class="card-back-corner top-right"></div>' +
            '<div class="card-back-corner bottom-left"></div>' +
            '<div class="card-back-corner bottom-right"></div>' +
            '<div class="card-back-symbol"></div>' +
            '<div class="card-back-center"></div>' +
            '<div class="card-back-text">' + (char.code || char.name) + '</div>' +
          '</div>' +
          '<div class="card-front">' +
            '<div class="card-front-pattern"></div>' +
            '<div class="card-front-border"></div>' +
            '<div class="card-front-ornament"></div>' +
            '<div class="card-front-avatar"><img class="avatar-img" src="' + char.avatar + '" alt="' + char.name + '"></div>' +
            '<div class="card-front-info">' +
              '<div class="card-front-name">' + char.name + '</div>' +
            '</div>' +
          '</div>';
        
        card.addEventListener('click', function(e) {
          e.stopPropagation();
          handleCardClick(index);
        });
        
        carouselTrack.appendChild(card);
      });
      
      initIndicator();
      updateCardPositions();
      updateBottomInfo();
    }
    
    function getPositionPriority(index) {
      var diff = index - currentIndex;
      var total = CHARACTERS.length;
      
      if (diff > total / 2) diff -= total;
      if (diff < -total / 2) diff += total;
      
      if (diff === 0) return 5;
      if (diff === 1) return 4;
      if (diff === -1) return 2;
      if (diff === 2) return 3;
      if (diff === -2) return 1;
      return 0;
    }

    function initIndicator() {
      navIndicator.innerHTML = '';
      CHARACTERS.forEach(function(_, index) {
        var dot = document.createElement('div');
        dot.className = 'indicator-dot' + (index === currentIndex ? ' active' : '');
        navIndicator.appendChild(dot);
      });
    }

    function updateIndicator() {
      var dots = navIndicator.querySelectorAll('.indicator-dot');
      dots.forEach(function(dot, index) {
        dot.classList.toggle('active', index === currentIndex);
      });
    }

    function getPositionName(indexDiff) {
      if (indexDiff === 0) return 'center';
      if (indexDiff === -1) return 'left1';
      if (indexDiff === -2) return 'left2';
      if (indexDiff === 1) return 'right1';
      if (indexDiff === 2) return 'right2';
      return 'hidden';
    }

    function updateCardPositions() {
      var cards = carouselTrack.querySelectorAll('.char-card');
      var total = CHARACTERS.length;
      
      cards.forEach(function(card) {
        var cardIndex = parseInt(card.dataset.index);
        var diff = cardIndex - currentIndex;
        
        if (diff > total / 2) diff -= total;
        if (diff < -total / 2) diff += total;
        
        var posName = getPositionName(diff);
        card.dataset.pos = posName;
      });
    }

    function updateBottomInfo() {
      var char = CHARACTERS[currentIndex];
      bottomNameDisplay.textContent = char.name;
      bottomDesc.textContent = char.description || '';
    }

    function goToCard(direction) {
      if (isAnimating) return;
      isAnimating = true;
      
      if (direction === 'next') {
        currentIndex = (currentIndex + 1) % CHARACTERS.length;
      } else {
        currentIndex = (currentIndex - 1 + CHARACTERS.length) % CHARACTERS.length;
      }
      
      isSelected = false;
      bottomConfirm.classList.remove('show');
      bottomConfirm.textContent = '请选择';
      
      var selectedCard = carouselTrack.querySelector('.selected');
      if (selectedCard) {
        selectedCard.classList.remove('selected');
        selectedCard.classList.remove('flipped');
        selectedCard.style.zIndex = '';
      }
      
      var allCards = carouselTrack.querySelectorAll('.char-card');
      allCards.forEach(function(c) {
        c.style.zIndex = '';
      });
      
      updateCardPositions();
      updateBottomInfo();
      updateIndicator();
      
      setTimeout(function() {
        isAnimating = false;
      }, 100);
    }

    function goToIndex(index) {
      if (isAnimating) return;
      isAnimating = true;
      
      currentIndex = index;
      
      isSelected = false;
      bottomConfirm.classList.remove('show');
      bottomConfirm.textContent = '请选择';
      
      var selectedCard = carouselTrack.querySelector('.selected');
      if (selectedCard) {
        selectedCard.classList.remove('selected');
        selectedCard.classList.remove('flipped');
        selectedCard.style.zIndex = '';
      }
      
      var allCards = carouselTrack.querySelectorAll('.char-card');
      allCards.forEach(function(c) {
        c.style.zIndex = '';
      });
      
      updateCardPositions();
      updateBottomInfo();
      updateIndicator();
      
      setTimeout(function() {
        isAnimating = false;
      }, 100);
    }

    function handleCardClick(index) {
      if (isAnimating) return;
      
      if (index !== currentIndex) {
        goToIndex(index);
        return;
      }
      
      if (!isSelected) {
        selectCard(index);
      } else {
        confirmSelection();
      }
    }

    function selectCard(index) {
      isAnimating = true;
      var card = carouselTrack.querySelector('[data-index="' + index + '"]');
      
      card.classList.add('flipped');
      card.style.zIndex = '99999';
      
      setTimeout(function() {
        card.classList.add('selected');
        isSelected = true;
        isAnimating = false;
        selectedCharacter = CHARACTERS[index];
        bottomConfirm.classList.add('show');
        bottomConfirm.textContent = '确认选择';
      }, 650);
    }

    function confirmSelection() {
      if (!selectedCharacter) return;
      
      Storage.set('selected_character', selectedCharacter.id);
      Debug.info('Character selected', { id: selectedCharacter.id, name: selectedCharacter.name });
      location.href = 'reader.html?char=' + selectedCharacter.id;
    }

    bottomConfirm.addEventListener('click', function(e) {
      e.stopPropagation();
      confirmSelection();
    });

    prevBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      goToCard('prev');
    });

    nextBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      goToCard('next');
    });

    var wrapper = document.getElementById('carouselWrapper');
    
    wrapper.addEventListener('touchstart', function(e) {
      if (isAnimating || isSelected) return;
      touchStartX = e.touches[0].clientX;
      touchStartY = e.touches[0].clientY;
      isDragging = true;
    }, { passive: true });

    wrapper.addEventListener('touchmove', function(e) {
      if (!isDragging || isAnimating || isSelected) return;
      
      var currentX = e.touches[0].clientX;
      var diffX = touchStartX - currentX;
      var sensitivity = 80;
      
      if (Math.abs(diffX) >= sensitivity) {
        var steps = Math.floor(Math.abs(diffX) / sensitivity);
        
        if (diffX > 0) {
          for (var i = 0; i < steps; i++) {
            currentIndex = (currentIndex + 1) % CHARACTERS.length;
          }
        } else {
          for (var i = 0; i < steps; i++) {
            currentIndex = (currentIndex - 1 + CHARACTERS.length) % CHARACTERS.length;
          }
        }
        
        touchStartX = currentX;
        updateCardPositions();
        updateBottomInfo();
        updateIndicator();
      }
    }, { passive: true });

    wrapper.addEventListener('touchend', function(e) {
      isDragging = false;
    });

    wrapper.addEventListener('mousedown', function(e) {
      if (isAnimating || isSelected) return;
      touchStartX = e.clientX;
      isDragging = true;
    });

    wrapper.addEventListener('mousemove', function(e) {
      if (!isDragging || isAnimating || isSelected) return;
      
      var diffX = touchStartX - e.clientX;
      var sensitivity = 60;
      
      if (Math.abs(diffX) >= sensitivity) {
        var steps = Math.floor(Math.abs(diffX) / sensitivity);
        
        if (diffX > 0) {
          for (var i = 0; i < steps; i++) {
            currentIndex = (currentIndex + 1) % CHARACTERS.length;
          }
        } else {
          for (var i = 0; i < steps; i++) {
            currentIndex = (currentIndex - 1 + CHARACTERS.length) % CHARACTERS.length;
          }
        }
        
        touchStartX = e.clientX;
        updateCardPositions();
        updateBottomInfo();
        updateIndicator();
      }
    });

    wrapper.addEventListener('mouseup', function(e) {
      isDragging = false;
    });

    wrapper.addEventListener('mouseleave', function(e) {
      isDragging = false;
    });

    document.addEventListener('keydown', function(e) {
      if (e.key === 'ArrowLeft') {
        goToCard('prev');
      } else if (e.key === 'ArrowRight') {
        goToCard('next');
      } else if (e.key === 'Enter' && !isSelected) {
        selectCard(currentIndex);
      } else if (e.key === 'Escape' && isSelected) {
        isSelected = false;
        bottomConfirm.classList.remove('show');
        bottomConfirm.textContent = '请选择';
        var selectedCard = carouselTrack.querySelector('.selected');
        if (selectedCard) {
          selectedCard.classList.remove('selected');
          selectedCard.classList.remove('flipped');
          selectedCard.style.zIndex = '';
        }
        var allCards = carouselTrack.querySelectorAll('.char-card');
        allCards.forEach(function(c) {
          c.style.zIndex = '';
        });
      } else if (e.key === 'Enter' && isSelected) {
        confirmSelection();
      }
    });

    initCarousel();
    Debug.info('Character carousel loaded', { characters: CHARACTERS.length });
  </script>
</body>
</html>
